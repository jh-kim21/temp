# 공통 API 설정 — 모든 프로파일에서 공유
api:
  base_url: "http://localhost:8080"
  timeout: 30
  stop_on_error: false
  ssl_verify: true   # false: SSL 검증 비활성화, 또는 CA 인증서 경로 지정

  # JWT 인증 설정 (불필요하면 auth 블록 전체 삭제)
  auth:
    login_endpoint: "/api/auth/login"
    username: "your_username"
    password: "your_password"
    token_json_path: "token"   # 중첩 경로는 점으로 구분: "data.accessToken"


# 프로파일 — Excel 파일 종류마다 하나씩 정의
# 실행: python main.py <excel_file> --profile <name>
profiles:

  - name: "sample"
    endpoint: "/api/sample"
    excel:
      sheet_name: null   # null = 첫 번째 시트
      text_columns:
        - excel_name: "Device ID"
          dto_field: "deviceId"
        - excel_name: "WF Process"
          dto_field: "wfProcess"
        - excel_name: "Mask Process"
          dto_field: "maskProcess"
        - excel_name: "P Layer ID"
          dto_field: "pLayerId"
        - excel_name: "Layer Name"
          dto_field: "layerName"
        - excel_name: "Mask Type"
          dto_field: "maskType"

  - name: "other"
    endpoint: "/api/other"
    excel:
      sheet_name: null
      text_columns:
        - excel_name: "Description"
          dto_field: "description"
        - excel_name: "Device"
          dto_field: "device"
          type: "json_array"    # 셀값 "LOG/DR" → '["LOG","DR"]'
        - excel_name: "History"
          dto_field: "history"
        - excel_name: "Keyword"
          dto_field: "keyword"
        - excel_name: "Layer Name"
          dto_field: "layerName"
          type: "json_array"
        - excel_name: "Mask Process"
          dto_field: "maskProcess"
          type: "json_array"
        - excel_name: "Mask Type"
          dto_field: "maskType"
          type: "json_array"
        - excel_name: "P Layer ID"
          dto_field: "pLayerId"
          type: "json_array"
        - excel_name: "WF Process"
          dto_field: "wfProcess"
          type: "json_array"
